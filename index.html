<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hiking Tracker</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="app">

    <div class="sidebar">
        <h2>Hikes</h2>

        <!-- 🔍 SEARCH BAR -->
        <input id="search-box" type="text" placeholder="Search location..." />
        <button id="search-btn">Search</button>

        <button id="mode-toggle">Mode: Snap</button>
        <button id="save-btn">Save Hike</button>
        <button id="undo-btn">Undo</button>
        <button id="clear-btn">Clear</button>

        <p id="live-distance">Distance: 0 km</p>

        <ul id="hike-list"></ul>
    </div>

    <div id="map"></div>

    <!-- DETAILS PANEL -->
    <div id="detail-panel" class="hidden">
        <h2 id="detail-name"></h2>

        <p><strong>Distance:</strong> <span id="detail-distance"></span></p>
        <p><strong>Elevation:</strong> <span id="detail-elevation"></span></p>

        <p><strong>Notes:</strong></p>
        <p id="detail-notes"></p>

        <button id="edit-btn">Edit</button>
        <button id="delete-btn">Delete</button>
    </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
