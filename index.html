<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hiking Tracker</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="app">

    <div class="sidebar">
        <h2>Hikes</h2>

        <button id="save-btn">Save Hike</button>
        <button id="undo-btn">Undo Last Point</button>
        <button id="clear-btn">Clear Drawing</button>

        <p id="live-distance">Distance: 0 km</p>

        <ul id="hike-list"></ul>
    </div>

    <div id="map"></div>

    <!-- Hike detail panel -->
    <div id="detail-panel" class="hidden">
        <button id="close-panel">X</button>
        <h2 id="detail-name"></h2>
        <p id="detail-distance"></p>
        <p id="detail-elevation"></p>
        <p id="detail-notes"></p>
    </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
